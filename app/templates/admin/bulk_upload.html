{% extends "base.html" %}
{% block title %}Bulk upload — Admin{% endblock %}
{% block content %}

<div class="form-card" style="max-width: 560px;">
  <h2 style="margin-bottom: 12px;">Bulk upload products</h2>
  <p style="color: var(--ink-soft); font-size: 14px; margin-bottom: 20px;">
    Upload a CSV with columns: <span class="mono">name, description, price, category_name, stock_qty, image_url</span>.
    New categories are created automatically if they don't already exist.
  </p>
  <form method="post" enctype="multipart/form-data">
    <div class="form-group">
      <label>CSV file</label>
      <input type="file" name="csv_file" accept=".csv" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Upload</button>
  </form>
</div>

{% endblock %}
