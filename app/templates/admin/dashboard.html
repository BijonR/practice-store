{% extends "base.html" %}
{% block title %}Admin — Ledger & Co{% endblock %}
{% block content %}

<h1 style="margin-top: 32px;">Admin dashboard</h1>

<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 24px 0;">
  <div class="form-card" style="margin: 0;"><div class="mono" style="font-size: 28px;">{{ product_count }}</div><div style="color: var(--ink-soft); font-size: 13px;">Products</div></div>
  <div class="form-card" style="margin: 0;"><div class="mono" style="font-size: 28px;">{{ order_count }}</div><div style="color: var(--ink-soft); font-size: 13px;">Orders</div></div>
  <div class="form-card" style="margin: 0;"><div class="mono" style="font-size: 28px; color: var(--danger);">{{ low_stock }}</div><div style="color: var(--ink-soft); font-size: 13px;">Low stock items</div></div>
  <div class="form-card" style="margin: 0;"><div class="mono" style="font-size: 28px;">{{ event_count }}</div><div style="color: var(--ink-soft); font-size: 13px;">Tracked events</div></div>
</div>

<div style="display: flex; gap: 12px; margin-bottom: 32px;">
  <a href="{{ url_for('admin.product_list') }}" class="btn btn-outline">Manage products</a>
  <a href="{{ url_for('admin.bulk_upload') }}" class="btn btn-outline">Bulk upload products</a>
  <a href="{{ url_for('admin.order_list') }}" class="btn btn-outline">View orders</a>
</div>

{% endblock %}
