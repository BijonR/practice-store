{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'New' }} product — Admin{% endblock %}
{% block content %}

<div class="form-card" style="max-width: 560px;">
  <h2 style="margin-bottom: 20px;">{{ 'Edit product' if product else 'New product' }}</h2>
  <form method="post">
    <div class="form-group"><label>Name</label><input type="text" name="name" value="{{ product.name if product else '' }}" required></div>
    <div class="form-group"><label>Description</label><textarea name="description" rows="3">{{ product.description if product else '' }}</textarea></div>
    <div class="form-group"><label>Price</label><input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required></div>
    <div class="form-group">
      <label>Category</label>
      <select name="category_id" required>
        {% for cat in categories %}
          <option value="{{ cat.id }}" {{ 'selected' if product and product.category_id == cat.id else '' }}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group"><label>Image URL</label><input type="text" name="image_url" value="{{ product.image_url if product else '' }}"></div>
    <div class="form-group"><label>Stock quantity</label><input type="number" name="stock_qty" value="{{ product.inventory.stock_qty if product and product.inventory else 0 }}"></div>
    <div class="form-group"><label>Reorder level</label><input type="number" name="reorder_level" value="{{ product.inventory.reorder_level if product and product.inventory else 10 }}"></div>
    {% if product %}
    <div class="form-group">
      <label><input type="checkbox" name="is_active" {{ 'checked' if product.is_active else '' }} style="width: auto;"> Active (visible in store)</label>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-primary" style="width: 100%;">{{ 'Save changes' if product else 'Create product' }}</button>
  </form>
</div>

{% endblock %}
